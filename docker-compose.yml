version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dayliff_backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dayliff_net

  celery-worker:
    build: ./backend
    container_name: dayliff_celery
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --beat
    networks:
      - dayliff_net

  redis:
    image: redis:7-alpine
    container_name: dayliff_redis
    ports:
      - "6379:6379"
    networks:
      - dayliff_net

  frontend:
    build: ./frontend
    container_name: dayliff_frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    networks:
      - dayliff_net

networks:
  dayliff_net:
    driver: bridge
